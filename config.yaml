web_corpus:
  rust:
    checkout_dir: "data/external/rust-web"
    repositories:
      - url: "https://github.com/rust-lang/book.git"
        name: "book"
        branch: "main"
      - url: "https://github.com/rust-lang/rust-by-example.git"
        name: "rust-by-example"
        branch: "main"
      - url: "https://github.com/rust-lang/reference.git"
        name: "reference"
        branch: "master"
      - url: "https://github.com/rust-lang/edition-guide.git"
        name: "edition-guide"
        branch: "main"
      - url: "https://github.com/rust-lang/rustc-dev-guide.git"
        name: "rustc-dev-guide"
        branch: "main"
  rust_code:
    checkout_dir: "data/external/rust-code"
    repositories:
      - url: "https://github.com/rust-lang/rust.git"
        name: "rust"
        branch: "master"
      - url: "https://github.com/rust-lang/cargo.git"
        name: "cargo"
        branch: "master"
      - url: "https://github.com/rust-lang/rust-analyzer.git"
        name: "rust-analyzer"
        branch: "master"
      - url: "https://github.com/tokio-rs/tokio.git"
        name: "tokio"
        branch: "master"
      - url: "https://github.com/serde-rs/serde.git"
        name: "serde"
        branch: "master"
      - url: "https://github.com/BurntSushi/ripgrep.git"
        name: "ripgrep"
        branch: "master"
      - url: "https://github.com/clap-rs/clap.git"
        name: "clap"
        branch: "master"
      - url: "https://github.com/tokio-rs/axum.git"
        name: "axum"
        branch: "main"
  fineweb_edu:
    output_dir: "data/external/fineweb-edu/shards"
    dataset: "HuggingFaceFW/fineweb-edu"
    split: "train"
    streaming: true
    max_documents: 2500
    max_total_characters: 6000000
    min_document_characters: 200
    max_document_characters: 4000
    shard_max_characters: 150000

model:
  vocab_size: 256
  block_size: 256
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.1

training:
  seed: 1337
  device: "auto"
  checkpoint_dir: "checkpoints"
  checkpoint_name: "sisyphus.pt"
  batch_size: 8
  eval_batch_size: 4
  gradient_accumulation_steps: 1
  max_batch_tokens: 4096
  max_eval_batch_tokens: 2048
  learning_rate: 0.0003
  weight_decay: 0.1
  betas: [0.9, 0.95]
  max_steps: 3000
  warmup_steps: 100
  eval_interval: 200
  eval_batches: 20
  save_interval: 500
  grad_clip: 1.0
  train_split: 0.9
  max_ram_utilization: 0.7
  max_vram_utilization: 0.8
  min_free_vram_bytes: 1073741824
  max_reserved_vram_bytes: 6442450944
  # Monarch-inspired optimizations
  gradient_quantization: true
  activation_compression: true
  selective_backprop: true
  sticky_params: true
  gradient_paging: true

generation:
  max_new_tokens: 200
  temperature: 0.9
  top_k: 50
